/* ================ BIOS configuration ================ */
// system stack
Program.stack = 0x2000;
Program.heap  = 0x400000;   /* 新增：为标准 C 库 malloc 提供 4MB 的物理堆 */

/* SYS/BIOS */
var BIOS         = xdc.useModule('ti.sysbios.BIOS');
var Clock        = xdc.useModule('ti.sysbios.knl.Clock');
var Task         = xdc.useModule('ti.sysbios.knl.Task');
var HeapMem      = xdc.useModule('ti.sysbios.heaps.HeapMem');
var Memory       = xdc.useModule('xdc.runtime.Memory');
var Semaphore    = xdc.useModule('ti.sysbios.knl.Semaphore');
var Hwi          = xdc.useModule('ti.sysbios.family.c64p.Hwi');
var CpIntc       = xdc.useModule('ti.sysbios.family.c66.tci66xx.CpIntc');

/* ================ Hardware Interrupt ================ */
/* Hardware Interrupt configurations for CPINTC are managed in C code (uart_echo.c)
 * because CPINTC mapping functions are run-time only on C66x. */

/* ================ Clock configuration ================ */
Clock.tickPeriod = 1000;    /* Clock tick is 1 ms */

/* ================ Memory ================ */
/* Create a HeapMem named "SystemHeap" */
var SystemHeapParams = new HeapMem.Params;
SystemHeapParams.size = 0x400000;          /* 4 MB NDK + 应用堆 */
SystemHeapParams.align = 8;
SystemHeapParams.sectionName = "SystemHeap";

/* Created as a global variable so it can be used in a C file */
Program.global.SystemHeap = HeapMem.create(SystemHeapParams);

/* Set "SystemHeap" as the default Heap */
/* Memory_alloc() is called when the heap is specified as a heap of NULL */
Memory.defaultHeapInstance = Program.global.SystemHeap;
Program.sectMap["SystemHeap"] = "DDR3";   /* Heap 缓冲区必须放在 DDR3 */

/* ================ PDK / CSL ================ */
/* 说明：CSL 通过 C 头文件（#include <ti/csl/...>）和 C 链接器库（ti.csl.ae66）使用，
 * 不需要经过 XDC 包管理。xdc.loadPackage('ti.csl') 会导致 XDC 按其路径约定
 * 搜索 ti.csl.ae66，但新版 PDK 的库在 lib/c6678/c66/release/ 子目录中，
 * XDC 无法自动定位，故移除此调用。库由 C Linker 的 Search Path 直接链接。 */

/* Load and use the System Package */
var System = xdc.useModule('xdc.runtime.System');
SysStd  = xdc.useModule('xdc.runtime.SysStd');
System.SupportProxy = SysStd;

/* ================ NDK 协议栈 ================ */
/* NDK heartbeat (poll) only, stack threads are created from C code */
var Global = xdc.useModule('ti.ndk.config.Global');
Global.enableCodeGeneration = false;
Global.memRawPageSize       = 2100;            /* NDK 内存页大小 */

/* NDK Task hook — required for NDK task tracking */
//Task.addHookSet({ registerFxn: '&NDK_hookInit', createFxn: '&NDK_hookCreate' });
/* 彻底修复 NDK 任务环境分配 Hook */
var ndkHook = new Task.HookSet();
ndkHook.registerFxn = "&NDK_hookInit";
ndkHook.createFxn   = "&NDK_hookCreate";
Task.addHookSet(ndkHook);

/* ================ CPPI / QMSS / PA 驱动包 ================ */
var Cppi = xdc.loadPackage('ti.drv.cppi');
var Qmss = xdc.loadPackage('ti.drv.qmss');
var Pa   = xdc.useModule('ti.drv.pa.Settings');

/* ================ EventCombiner (以太网中断路由) ================ */
var Ecm = xdc.useModule('ti.sysbios.family.c64p.EventCombiner');
Ecm.eventGroupHwiNum[0] = 7;
Ecm.eventGroupHwiNum[1] = 8;
Ecm.eventGroupHwiNum[2] = 9;
Ecm.eventGroupHwiNum[3] = 10;


/* ================ NDK 专用内存段 ================ */
Program.sectMap[".nimu_eth_ll2"]         = "L2SRAM";
Program.sectMap[".resmgr_memregion"]     = {loadSegment: "L2SRAM", loadAlign: 128};
Program.sectMap[".resmgr_handles"]       = {loadSegment: "L2SRAM", loadAlign: 16};
Program.sectMap[".resmgr_pa"]            = {loadSegment: "L2SRAM", loadAlign: 8};
Program.sectMap[".cppi"]                 = "DDR3";
Program.sectMap[".qmss"]                 = "DDR3";
Program.sectMap[".far:NDK_OBJMEM"]       = {loadSegment: "DDR3",   loadAlign: 8};
Program.sectMap[".far:NDK_PACKETMEM"]    = {loadSegment: "DDR3",   loadAlign: 128};
Program.sectMap[".far:taskStackSection"] = "DDR3";

/* ================ 数据/代码段 — 三组必须保持一致 ================ */
/* 规则：.bss / .neardata / .rodata(.const) 必须在同一物理段以支持 NEAR 寻址 */
Program.sectMap[".bss"]      = "L2SRAM";   /* 未初始化全局变量 (移回 L2 以满足 NDK/PDK NEAR 寻址) */
Program.sectMap[".neardata"] = "L2SRAM";   /* 近端初始化数据 */
Program.sectMap[".rodata"]   = "L2SRAM";   /* 常量只读数据 */
Program.sectMap[".const"]    = "L2SRAM";   /* TI 等价于 .rodata */
Program.sectMap[".cinit"]    = "L2SRAM";   /* C 初始化表 */
Program.sectMap[".far"]      = "DDR3";
Program.sectMap[".fardata"]  = "DDR3";     /* 真正的大容量 Far 数据放 DDR3 */
Program.sectMap[".text"]     = "DDR3";
Program.sectMap[".code"]     = "DDR3";
Program.sectMap[".switch"]   = "DDR3";
Program.sectMap[".vecs"]     = "DDR3";
Program.sectMap[".cio"]      = "DDR3";
Program.sectMap[".stack"]    = "L2SRAM";   /* 中断/任务栈放 L2，降低访问延迟 */
Program.sectMap[".sysmem"]   = "DDR3";     /* 新增：将 malloc 的物理内存段放在 DDR3 中 */


